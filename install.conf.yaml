- defaults:
    link:
      create: true
      relink: true
    brewfile:
      stdout: false
      stderr: false
      include: ['tap', 'brew', 'cask', 'mas']

- create:
    - ~/.config
    - ~/.cache
    - ~/.local/share
    - ~/.local/state
    - ~/.ssh

- shell:
    - [chmod 700 ~/.ssh, Set private directory permissions]
    - [chmod 755 ~/.config ~/.cache ~/.local ~/.local/share ~/.local/state, Set XDG directory permissions]

- link:
    ~/.config/1Password: config/1Password
    ~/.config/AGENTS.md: config/AGENTS.md
    ~/.config/PROFILE.md: config/PROFILE.md
    ~/.config/bat: config/bat
    ~/.config/ghostty: config/ghostty
    ~/.config/git: config/git
    ~/.config/mise: config/mise
    ~/.config/nvim: config/nvim
    ~/.config/oh-my-posh: config/oh-my-posh
    ~/.config/opencode: config/opencode
    ~/.local/share/opencode:
      path: ~/Documents/.opencode
      ignore-missing: true
    ~/.local/state/lesshst:
      path: ~/Documents/.lesshst
      ignore-missing: true
    ~/.config/vim: config/vim
    ~/.config/zsh: config/zsh
    ~/.config/zsh/.zsh_history:
      path: ~/Documents/.zsh_history
      ignore-missing: true

    ~/.zshenv: config/zsh/.zshenv

    ~/.ssh/config: config/ssh/config
    ~/.ssh/id_ed25519.pub: config/ssh/id_ed25519.pub

    ~/.ssh/1password-agent.sock:
      path: ~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock
      ignore-missing: true

    ~/.codex:
      path: ~/Documents/.codex
      ignore-missing: true
    ~/.claude:
      path: ~/Documents/.claude
      ignore-missing: true
    ~/.claude.json:
      path: ~/Documents/.claude.json
      ignore-missing: true

- brewfile:
    file: Brewfile

- shell:
    - [rm -rf "$HOME/.zsh_sessions" "$HOME/.zsh_history" "$HOME/.lesshst", Remove legacy zsh and less state files]
    - [mise install, Install global mise toolchains]
    - [mise trust "$HOME/.dotfiles/config/mise", Trust dotfiles mise config]
    - [mise trust "$HOME/.config/mise", Trust linked mise config]
    - [mise exec -- corepack enable, Enable Corepack]
    - [bash "$HOME/.dotfiles/osx.sh", Apply macOS settings]
