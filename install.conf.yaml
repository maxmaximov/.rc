- defaults:
    link:
      create: true
      relink: true
    brewfile:
      stdout: false
      stderr: false
      include: ['tap', 'brew', 'cask', 'mas']

- create:
    - ~/.config
    - ~/.cache
    - ~/.local/share
    - ~/.local/state
    - ~/.ssh
    - ~/.1password

- shell:
    - [chmod 700 ~/.ssh ~/.1password, Set private directory permissions]

- link:
    ~/.config/1Password: config/1Password
    ~/.config/AGENTS.md: config/AGENTS.md
    ~/.config/PROFILE.md: config/PROFILE.md
    ~/.config/bat: config/bat
    ~/.config/ghostty: config/ghostty
    ~/.config/git: config/git
    ~/.config/mise: config/mise
    ~/.config/nvim: config/nvim
    ~/.config/oh-my-posh: config/oh-my-posh
    ~/.config/opencode: config/opencode
    ~/.config/vim: config/vim
    ~/.config/zsh: config/zsh

    ~/.zshenv: config/zsh/.zshenv

    ~/.ssh/config: config/ssh/config
    ~/.ssh/id_ed25519.pub: config/ssh/id_ed25519.pub

    ~/.1password/agent.sock: ~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock

- brewfile:
    file: Brewfile

- shell:
    - [mise install, Install global mise toolchains]
    - [mise trust "$HOME/.dotfiles/config/mise", Trust dotfiles mise config]
    - [mise trust "$HOME/.config/mise", Trust linked mise config]
    - [corepack enable, Enable Corepack]
    - [bash "$HOME/.dotfiles/osx.sh", Apply macOS settings]
